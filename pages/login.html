<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../images/login.png" type="image/png">
    <!-- <link rel="stylesheet" href="../css/main-design/global.css">
    <link rel="stylesheet" href="../css/main-design/auth.css"> -->
    <!-- <link rel="stylesheet" href="../css/ocean-theme/global.css">
    <link rel="stylesheet" href="../css/ocean-theme/auth.css"> -->
    <link rel="stylesheet" href="../css/responsive/global.css">
    <link rel="stylesheet" href="../css/responsive/auth.css">
    <title>Login - Booking</title>
</head>
<body class="auth-page">
    
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to manage your bookings</p>
        
        <form action="../index.html">
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn-primary btn-block">Log in</button>
            
        </form>
        
        <p class="auth-link">Don't have an account? <a href="sign-up.html" title="Create a new account" target="_top">Sign up</a></p>
    </div>

</body>
</html>
