<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../images/login.png" type="image/png">
    <link rel="stylesheet" href="../css/responsive/global.css">
    <link rel="stylesheet" href="../css/responsive/auth.css">
    <script type="module" src="../scripts/account-forms.js"></script>
    <title>Login - Booking</title>
</head>
<body class="auth-page">
    
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to manage your bookings</p>
        
        <form action="../index.html" id="login-form">
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="login-email" name="email" placeholder="Enter your email" required>
                <div id="login-email-error" class="error-text"></div>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                <div id="login-password-error" class="error-text"></div>
            </div>
            
            <button type="submit" class="btn-primary btn-block">Log in</button>
            
        </form>
        
        <p class="auth-link">Don't have an account? <a href="sign-up.html" title="Create a new account" target="_top">Sign up</a></p>
    </div>

</body>
</html>
